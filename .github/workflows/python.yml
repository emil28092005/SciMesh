name: python

on:
  push:
    paths:
      - "scimesh/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "scimesh/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/python.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: pytest -q
